services:
  app:
    build: .
    container_name: maintenance-app
    ports:
      - "3030:3000"
    volumes:
      # Bind mount for database persistence (moves db out of prisma folder to avoid hiding schema)
      - ./data:/app/data
      # Bind mount for user-uploaded files
      - ./public/uploads:/app/public/uploads
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - AUTH_SECRET=your_auth_secret_here # Change this in your .env
      - AUTH_TRUST_HOST=true
    restart: always
