services:
  app:
    build: .
    container_name: maintenance-app
    ports:
      - "3000:3000"
    volumes:
      # Bind mount for database persistence (mounts the whole prisma folder to include migrations)
      - ./prisma:/app/prisma
      # Bind mount for user-uploaded files
      - ./public/uploads:/app/public/uploads
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - AUTH_SECRET=your_auth_secret_here # Change this in your .env
      - AUTH_TRUST_HOST=true
    restart: always
